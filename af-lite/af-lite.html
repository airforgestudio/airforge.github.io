<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AF | LITE</title>
<style>
  :root{
    --bg:#020910; --bg2:#05131f; --panel:#071827; --panel2:#0a2235;
    --border:#0a7fb2; --borderBright:#22d8ff; --cyan:#22d8ff; --blue:#48a8ff;
    --green:#12ffa2; --amber:#ffc34d; --red:#ff4d67; --magenta:#b767ff; --orange:#ff8a36;
    --text:#eef6fb; --muted:#7d93a3;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overflow:hidden;
  }
  .app{ display:flex; flex-direction:column; height:100vh; }

  /* Transport */
  .transport{
    display:flex; align-items:center; gap:14px; padding:10px 16px;
    background:var(--panel); border-bottom:1px solid rgba(34,216,255,.18);
  }
  .brand{ font-weight:800; letter-spacing:2px; font-size:15px; margin-right:2px; }
  #logoMeter{ margin-right:8px; }
  .brand .mix{ color:var(--cyan); }
  .tbtn{
    width:36px; height:36px; border-radius:8px; background:var(--panel2);
    border:1px solid rgba(34,216,255,.25); color:var(--text); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .tbtn:hover{ border-color:var(--cyan); box-shadow:0 0 10px rgba(34,216,255,.3); }
  .timeReadout{
    font-variant-numeric:tabular-nums; font-size:15px; font-weight:700;
    background:var(--bg2); border:1px solid rgba(34,216,255,.2); border-radius:6px;
    padding:6px 12px; letter-spacing:1px;
  }
  .spacer{ flex:1; }
  .masterWrap{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); }
  .snapToggle{
    font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px;
    background:var(--panel2); border:1px solid rgba(34,216,255,.2); border-radius:6px;
    padding:5px 10px; cursor:pointer; user-select:none;
  }
  .snapToggle.on{ color:var(--cyan); border-color:var(--cyan); }

  /* Ruler */
  .ruler{
    height:26px; background:var(--bg2); position:relative;
    margin-left:190px; border-bottom:1px solid rgba(34,216,255,.12);
  }

  /* Tracks */
  .tracks{ flex:1; overflow-y:auto; }
  .trackRow{ display:flex; height:110px; border-bottom:1px solid rgba(255,255,255,.05); }
  .trackHeader{
    width:190px; flex:0 0 190px; background:var(--panel); padding:10px;
    border-right:1px solid rgba(34,216,255,.12); position:relative;
  }
  .trackHeader .stripe{ position:absolute; left:0; top:0; bottom:0; width:4px; }
  .trackTop{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .trackNum{ font-size:17px; font-weight:800; }
  .trackBtns{ display:flex; gap:5px; margin-bottom:6px; }
  .mbtn{
    min-width:26px; padding:0 6px; height:22px; border-radius:5px; font-size:10.5px; font-weight:700;
    background:var(--panel2); border:1px solid rgba(34,216,255,.25); color:var(--muted);
    cursor:pointer;
  }
  .mbtn.active{ background:var(--cyan); color:var(--bg); border-color:var(--cyan); }
  .dbLabel{ font-size:10px; color:var(--muted); text-align:center; margin:2px 0 6px; }
  .fxPopover{
    position:fixed; z-index:9998; background:var(--panel2);
    border:1px solid rgba(34,216,255,.35); border-radius:8px; padding:10px 12px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .fxPopTitle{ font-size:10.5px; color:var(--muted); margin-bottom:8px; font-weight:700; }
  .fxPopover .eqRow{ display:flex; gap:10px; }
  .eqCol{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .eqCol span{ font-size:9px; color:var(--muted); }
  .eqCol canvas{ cursor:ns-resize; }
  .faderRow{ display:flex; align-items:center; gap:6px; }
  .faderCanvasWrap{ width:100%; }

  .laneWrap{ flex:1; position:relative; background:var(--bg2); }
  .lane{ position:absolute; inset:0; }

  .exportFormat{
    background:var(--panel2); color:var(--text); border:1px solid rgba(34,216,255,.35);
    border-radius:7px; padding:8px 9px; font-size:12px; font-weight:700;
  }
  .exportFormat:focus{ outline:none; border-color:var(--cyan); }
  .exportBtn{
    background:linear-gradient(180deg,#1d4f66,#0a2235); color:var(--text);
    border:1px solid var(--cyan); border-radius:7px; padding:8px 16px;
    font-size:12.5px; font-weight:700; cursor:pointer; letter-spacing:.3px;
  }
  .exportBtn:hover{ box-shadow:0 0 12px rgba(34,216,255,.4); }
  .exportBtn:disabled{ opacity:0.5; cursor:default; box-shadow:none; }

  .mainArea{ flex:1; display:flex; min-height:0; }
  .timelineCol{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .timelineCol .tracks{ flex:1; }

  .metaPanel{
    width:250px; flex:0 0 250px; background:var(--panel);
    border-left:1px solid rgba(34,216,255,.18); padding:11px 12px; overflow-y:auto;
  }
  .metaHeader{
    font-size:12px; font-weight:800; letter-spacing:.5px; color:var(--cyan);
    margin-bottom:9px; padding-bottom:7px; border-bottom:1px solid rgba(34,216,255,.15);
  }
  .metaGrid{ display:grid; grid-template-columns:minmax(0,1fr); gap:7px; }
  .metaGrid.twoCol{ grid-template-columns:minmax(0,1fr) minmax(0,1fr); }
  .metaPanel label{
    display:block; min-width:0; font-size:10.5px; color:var(--muted); margin-bottom:0;
  }
  .metaPanel input{
    display:block; width:100%; min-width:0; margin-top:3px; background:var(--bg2);
    border:1px solid rgba(34,216,255,.2); border-radius:5px; color:var(--text);
    padding:5px 7px; font-size:12px;
  }
  .metaPanel input:focus{ outline:none; border-color:var(--cyan); }
  .metaSub{
    font-size:11px; font-weight:700; color:var(--cyan); margin:11px 0 7px;
  }
  .markerRow{ display:flex; align-items:flex-end; gap:6px; margin-bottom:7px; }
  .markerRow label{ flex:1; margin-bottom:0; }
  .setBtn{
    background:var(--panel2); border:1px solid rgba(34,216,255,.3); color:var(--cyan);
    border-radius:5px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer;
    height:31px;
  }
  .setBtn:hover{ border-color:var(--cyan); box-shadow:0 0 8px rgba(34,216,255,.3); }
  .metaHint{ font-size:10px; color:var(--muted); line-height:1.5; margin-top:10px; }

  .ctxMenu{
    position:fixed; display:none; background:var(--panel2);
    border:1px solid rgba(34,216,255,.35); border-radius:8px; padding:5px;
    box-shadow:0 8px 24px rgba(0,0,0,.5); z-index:9999; min-width:170px;
  }
  .ctxItem{
    padding:8px 12px; font-size:12.5px; border-radius:5px; cursor:pointer;
    color:var(--text);
  }
  .ctxItem:hover{ background:rgba(34,216,255,.18); color:var(--cyan); }
  .ctxItem.disabled{ color:var(--muted); cursor:default; }
  .ctxItem.disabled:hover{ background:none; color:var(--muted); }
  .ctxSep{ height:1px; background:rgba(255,255,255,.08); margin:4px 2px; }

  .topBar{
    display:flex; align-items:center; gap:14px; padding:8px 16px;
    background:var(--panel); border-bottom:1px solid rgba(34,216,255,.18);
  }
  .transport{
    min-height:70px; padding:8px 12px; border-top:1px solid rgba(34,216,255,.22);
    border-bottom:none; justify-content:center; background:#04111c;
  }
  .transport .timeReadout{ font-size:25px; min-width:145px; text-align:center; padding:8px 14px; }
  .transport .tbtn{ width:42px; height:42px; font-size:17px; }
  .transport #btnPlay{ border-color:var(--cyan); box-shadow:0 0 8px rgba(34,216,255,.18); }
  .transport #logoMeter{ margin-left:8px; margin-right:0; }
  .addAudioBtn{
    margin-left:auto; height:22px; padding:0 8px; border-radius:5px; cursor:pointer;
    background:rgba(34,216,255,.08); border:1px solid rgba(34,216,255,.35);
    color:var(--cyan); font-size:10px; font-weight:800; letter-spacing:.4px;
  }
  .addAudioBtn:hover{ border-color:var(--cyan); box-shadow:0 0 8px rgba(34,216,255,.25); }
  .sessionBtn{
    height:34px; padding:0 12px; border-radius:7px; cursor:pointer;
    background:var(--panel2); border:1px solid rgba(34,216,255,.30);
    color:var(--text); font-size:11.5px; font-weight:700; white-space:nowrap;
  }
  .sessionBtn:hover{ border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 8px rgba(34,216,255,.22); }
  .mbtn.recordArm{ color:#ff6b80; border-color:rgba(255,77,103,.45); }
  .mbtn.recordArm.active{ background:#ff4d67; color:#fff; border-color:#ff7188; box-shadow:0 0 9px rgba(255,77,103,.45); }
  #btnRecord.recording{ background:#ff4d67; color:#fff !important; border-color:#ff8a9b; box-shadow:0 0 16px rgba(255,77,103,.72); animation:recordPulse 1s ease-in-out infinite; }
  .recBadge{ display:none; align-items:center; height:18px; padding:0 6px; border-radius:9px; background:#ff4d67; color:#fff; font-size:9px; font-weight:900; letter-spacing:.65px; box-shadow:0 0 9px rgba(255,77,103,.45); }
  .trackHeader.recordingTrack .recBadge{ display:inline-flex; animation:recordPulse 1s ease-in-out infinite; }
  @keyframes recordPulse{ 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.94);opacity:.72} }

  /* Mobile/tablet navigation: preserve the workstation instead of crushing it. */
  @media (max-width: 820px){
    html,body{ overflow:auto; min-height:100%; }
    .app{ min-width:0; height:auto; min-height:100vh; overflow:visible; }
    .transport{ position:sticky; top:0; z-index:1000; flex-wrap:wrap; gap:8px; padding:8px; }
    .transport .spacer{ display:none; }
    .brand{ order:-1; }
    .timeReadout{ font-size:14px; padding:6px 8px; }
    .tbtn{ width:38px; height:38px; }
    .masterWrap{ width:100%; justify-content:flex-end; order:20; }
    .exportFormat,.exportBtn{ min-height:38px; }
    .mainArea{ display:block; overflow:visible; }
    .timelineCol{ width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .timelineCol > .ruler, .timelineCol > .tracks{ min-width:760px; }
    .ruler{ margin-left:145px; }
    .trackHeader{ width:145px; flex-basis:145px; padding:8px; }
    .trackRow{ height:104px; }
    .metaPanel{ width:100%; max-height:none; border-left:0; border-top:1px solid rgba(34,216,255,.18); padding:12px; }
    .metaPanel label{ margin-bottom:7px; }
    canvas{ touch-action:none; }
  }
  @media (max-width: 480px){
    #logoMeter{ width:44px; height:44px; }
    .brand{ font-size:13px; margin-right:0; }
    .snapToggle{ width:100%; justify-content:center; order:18; }
    .exportFormat{ flex:1; }
    .exportBtn{ flex:1; }
  }

</style>
</head>
<body>
<div class="app">

  <div class="topBar">
    <div class="brand"><span style="color:var(--text)">AF</span> <span class="mix">| LITE</span></div>
    <button class="sessionBtn" id="btnOpenSession">Open Session</button>
    <button class="sessionBtn" id="btnSaveSession">Save Session As</button>
    <button class="sessionBtn" id="btnPackageSession" title="Download a ZIP containing the Studio-compatible session and its source audio">Studio Package</button>
    <input id="sessionFileInput" type="file" accept=".cfsession,.afsession,.afs,.xml,text/xml" hidden>
    <input id="sessionAudioInput" type="file" accept="audio/*" multiple hidden>
    <div class="spacer"></div>
    <div class="snapToggle on" id="snapToggle">Snap: On (hold Alt to bypass)</div>
    <div class="masterWrap">Master
      <canvas id="masterFader" width="90" height="26"></canvas>
      <span id="masterDbLabel">0.0 dB</span>
    </div>
    <select class="exportFormat" id="exportFormat" aria-label="Export format"><option value="wav">WAV • WideOrbit</option><option value="mp3">MP3 • Mobile</option></select>
    <button class="exportBtn" id="btnExport">Export</button>
  </div>

  <div class="mainArea">
    <div class="timelineCol">
      <div class="ruler"><canvas id="rulerCanvas"></canvas></div>
      <div class="tracks" id="tracks"></div>
    </div>

    <div class="metaPanel">
      <div class="metaHeader">Broadcast Profile</div>
      <div class="metaGrid twoCol">
        <label>Asset ID<input data-meta="assetId"></label>
        <label>Year<input data-meta="year"></label>
      </div>
      <div class="metaGrid" style="margin-top:7px;">
        <label>Title<input data-meta="title"></label>
        <label>Artist<input data-meta="artist"></label>
        <label>Outcue<input data-meta="outcue"></label>
      </div>
      <div class="metaGrid twoCol" style="margin-top:7px;">
        <label>Start Date<input data-meta="startDate"></label>
        <label>End Date<input data-meta="endDate"></label>
      </div>
      <div class="metaSub">Markers</div>
      <div class="markerRow">
        <label>Intro<input id="introField" value="0:00.000"></label>
        <button class="setBtn" id="setIntro">Set</button>
      </div>
      <div class="markerRow">
        <label>EOM<input id="eomField" value="0:00.000"></label>
        <button class="setBtn" id="setEom">Set</button>
      </div>
      <div class="metaHint">Type exact times or click Set. Export writes WideOrbit SCOT, BWF, RIFF INFO, ID3-style tags, and Intro/EOM cue markers.</div>
    </div>
  </div>

  <div class="transport">
    <div class="timeReadout" id="timeReadout">00:00.0</div>
    <button class="tbtn" id="btnToStart" title="Return to start">|&#9664;</button>
    <button class="tbtn" id="btnPlay" title="Play / Pause">&#9654;</button>
    <button class="tbtn" id="btnStop" title="Stop">&#9632;</button>
    <button class="tbtn" id="btnRecord" title="Record microphone to armed track" style="color:#ff5a73">&#9679;</button>
    <button class="tbtn" id="btnSplit" title="Split selected clip at playhead">&#10072;&#10072;</button>
    <button class="tbtn" id="btnDelete" title="Remove selected clip (Delete)">&#128465;</button>
    <button class="tbtn" id="btnZoomIn" title="Zoom in around playhead">+</button>
    <button class="tbtn" id="btnZoomOut" title="Zoom out around playhead">&minus;</button>
    <button class="tbtn" id="btnFit" title="Fit session to window">&#8596;</button>
    <canvas id="logoMeter" width="58" height="58"></canvas>
  </div>

  <div class="ctxMenu" id="ctxMenu"></div>

</div>

<script>
// Surface any error visibly instead of a silent blank page -- this line
// alone should tell us definitively what's actually happening if something
// is failing at runtime.
window.addEventListener('error', (e) => {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff4d67;color:#020910;padding:10px 14px;font-family:monospace;font-size:12px;z-index:99999;white-space:pre-wrap;';
  div.textContent = 'AirForge Lite error: ' + e.message + '  (line ' + e.lineno + ', col ' + e.colno + ')';
  document.body.appendChild(div);
});

// ---------------------------------------------------------------------------
// AirForge Lite -- 4-track web editor. No Editor workspace, no AF|Prep, no
// VST/heavy plugins. Move/trim/fade/split on up to one clip-chain per track,
// a light per-track 3-band EQ using native BiquadFilterNodes (no custom DSP
// at all), styled to match the real app's colour palette and fader language.
// ---------------------------------------------------------------------------

const AF = {
  cyan:'#22d8ff', green:'#12ffa2', magenta:'#b767ff', orange:'#ff8a36',
  bg:'#020910', panel2:'#0a2235'
};
const TRACK_COLORS = [AF.cyan, AF.green, AF.magenta, AF.orange];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);

// Tap the actual master bus -- this is a real meter, not a loop. connect()
// fans out without disturbing the existing signal path to destination.
const meterAnalyser = audioCtx.createAnalyser();
meterAnalyser.fftSize = 512;
meterAnalyser.smoothingTimeConstant = 0.35;
masterGain.connect(meterAnalyser);
const meterFreqData = new Uint8Array(meterAnalyser.frequencyBinCount);
const meterTimeData = new Uint8Array(meterAnalyser.fftSize);

let snapEnabled = true;
let timelineLength = 60; // seconds, auto-extends as content is added
let playhead = 0;
let isPlaying = false;
let isRecording = false;
let mediaRecorder = null;
let recordStream = null;
let recordChunks = [];
let recordStartPosition = 0;
let armedTrackIndex = 0;
let transportStartCtxTime = 0;
let transportStartOffset = 0;
let pxPerSecond = 40;
let viewStartSeconds = 0;
const markerState = { intro: 5, eom: 18 };
const metaState = { assetId:'', title:'', artist:'', outcue:'', startDate:'', endDate:'', year:'' };
const sessionState = { openedFromFile:false, sourceName:'Untitled.cfsession', pendingXml:null, sourceFiles:new Map() };


function transportNow(){
  return isPlaying ? (audioCtx.currentTime - transportStartCtxTime + transportStartOffset) : playhead;
}

// --- Fader (matches AirForgeFaderLookAndFeel: glow line, gradient cap, unity tick) ---
function drawFader(canvas, valueDb, color){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  const minDb = -60, maxDb = 12;
  const t = (valueDb - minDb) / (maxDb - minDb); // 0..1
  const trackY = h/2, trackLeft = 8, trackRight = w-8;
  const thumbX = trackLeft + t*(trackRight-trackLeft);

  ctx.strokeStyle = 'rgba(34,216,255,0.15)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(trackLeft, trackY); ctx.lineTo(trackRight, trackY); ctx.stroke();

  // glow fill from left to thumb
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.shadowColor = color; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(trackLeft, trackY); ctx.lineTo(thumbX, trackY); ctx.stroke();
  ctx.shadowBlur = 0;

  // unity tick (0dB)
  const unityT = (0 - minDb)/(maxDb-minDb);
  const unityX = trackLeft + unityT*(trackRight-trackLeft);
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(unityX, trackY-6); ctx.lineTo(unityX, trackY+6); ctx.stroke();

  // round handle, accent-coloured to match the track/master identity
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(thumbX, trackY, 6, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(thumbX, trackY, 6, 0, Math.PI*2); ctx.stroke();
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function faderXToDb(canvas, mouseX){
  const w = canvas.width, trackLeft=8, trackRight=w-8;
  const t = Math.max(0, Math.min(1, (mouseX-trackLeft)/(trackRight-trackLeft)));
  return -60 + t*(12-(-60));
}

function wireFader(canvas, labelEl, getDb, setDb, color){
  const render = (db) => {
    drawFader(canvas, db, color);
    if (labelEl) labelEl.textContent = (db>=0?'+':'') + db.toFixed(1) + ' dB';
  };
  render(getDb());
  let dragging = false;
  const update = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    let db = faderXToDb(canvas, x);
    if (Math.abs(db) < 0.6) db = 0; // gentle snap to unity
    setDb(db);
    render(db);
  };
  canvas.addEventListener('mousedown', e => { dragging = true; update(e); });
  window.addEventListener('mousemove', e => { if (dragging) update(e); });
  window.addEventListener('mouseup', () => dragging = false);
  canvas.addEventListener('dblclick', () => { setDb(0); render(0); });
}

wireFader(document.getElementById('masterFader'), document.getElementById('masterDbLabel'),
  () => 20*Math.log10(masterGain.gain.value || 0.0001),
  (db) => { masterGain.gain.value = Math.pow(10, db/20); }, AF.cyan);

// --- Rotary EQ knob (matches FX rack knob language: glow ring + gradient body) ---
function drawKnob(canvas, value01, accent){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2, r=w/2-2;
  const startA = Math.PI*0.75, endA = Math.PI*2.25;
  const angle = startA + value01*(endA-startA);

  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=2.4;
  ctx.beginPath(); ctx.arc(cx,cy,r,startA,endA); ctx.stroke();

  ctx.strokeStyle = accent; ctx.lineWidth=2.4;
  ctx.shadowColor = accent; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.arc(cx,cy,r,startA,angle); ctx.stroke();
  ctx.shadowBlur=0;

  const grad = ctx.createRadialGradient(cx,cy-2,1,cx,cy,r*0.7);
  grad.addColorStop(0,'#233947'); grad.addColorStop(1,'#0b1622');
  ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy,r*0.62,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.4;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(angle)*r*0.2, cy+Math.sin(angle)*r*0.2);
  ctx.lineTo(cx+Math.cos(angle)*r*0.55, cy+Math.sin(angle)*r*0.55);
  ctx.stroke();
}
function wireKnob(canvas, accent, onChange, initialValue=0.5, resetValue=0.5){
  let value = initialValue;
  drawKnob(canvas, value, accent);
  let dragging=false, startY=0, startVal=0;
  canvas.addEventListener('mousedown', e => { dragging=true; startY=e.clientY; startVal=value; });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    value = Math.max(0, Math.min(1, startVal + (startY - e.clientY)/120));
    drawKnob(canvas, value, accent);
    onChange(value);
  });
  window.addEventListener('mouseup', () => dragging=false);
  canvas.addEventListener('dblclick', () => { value=resetValue; drawKnob(canvas,value,accent); onChange(value); });
}

// Synthesized impulse response for the reverb -- white noise shaped with an
// exponential decay. No IR file needed, no custom DSP beyond generating the
// buffer once; the actual reverb processing is entirely the native
// ConvolverNode. This is the standard technique for a real (if simple)
// algorithmic reverb using only built-in Web Audio nodes.
function createImpulseResponse(ctx, duration, decay){
  const rate = ctx.sampleRate;
  const length = Math.floor(rate*duration);
  const impulse = ctx.createBuffer(2, length, rate);
  for (let ch=0; ch<2; ch++){
    const data = impulse.getChannelData(ch);
    for (let i=0;i<length;i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/length, decay);
  }
  return impulse;
}

// Built once and reused for BOTH live playback (audioCtx) and export
// (OfflineAudioContext) -- if these ever drifted into two separate
// implementations, "sounds right live, missing from the export" is exactly
// the kind of bug that creates.
function buildFxChain(ctx, inputNode, outputNode){
  const delayNode = ctx.createDelay(2.0); delayNode.delayTime.value = 0.35;
  const delayFeedback = ctx.createGain(); delayFeedback.gain.value = 0.35;
  const delayWet = ctx.createGain(); delayWet.gain.value = 0;
  const delayDry = ctx.createGain(); delayDry.gain.value = 1;
  const postDelay = ctx.createGain();
  inputNode.connect(delayDry); delayDry.connect(postDelay);
  inputNode.connect(delayNode); delayNode.connect(delayFeedback); delayFeedback.connect(delayNode);
  delayNode.connect(delayWet); delayWet.connect(postDelay);

  const convolver = ctx.createConvolver();
  convolver.buffer = createImpulseResponse(ctx, 2.4, 2.6);
  const reverbWet = ctx.createGain(); reverbWet.gain.value = 0;
  const reverbDry = ctx.createGain(); reverbDry.gain.value = 1;
  postDelay.connect(reverbDry); reverbDry.connect(outputNode);
  postDelay.connect(convolver); convolver.connect(reverbWet); reverbWet.connect(outputNode);

  return { delayNode, delayFeedback, delayWet, reverbWet };
}

// --- Track ---
class Track{
  constructor(index, headerEl, laneEl){
    this.index = index;
    this.color = TRACK_COLORS[index % 4];
    this.clips = []; // {buffer, peaks, startSeconds, trimStart, duration, fadeIn, fadeOut, sourceDuration, sourceFileName, sourceFile}
    this.selected = -1;
    this.mute = false; this.solo = false;

    this.gainNode = audioCtx.createGain();
    this.lowFilter = audioCtx.createBiquadFilter(); this.lowFilter.type='lowshelf'; this.lowFilter.frequency.value=200;
    this.midFilter = audioCtx.createBiquadFilter(); this.midFilter.type='peaking'; this.midFilter.frequency.value=1200; this.midFilter.Q.value=0.9;
    this.highFilter = audioCtx.createBiquadFilter(); this.highFilter.type='highshelf'; this.highFilter.frequency.value=5000;
    this.gainNode.connect(this.lowFilter); this.lowFilter.connect(this.midFilter);
    this.midFilter.connect(this.highFilter);
    const fx = buildFxChain(audioCtx, this.highFilter, masterGain);
    this.delayWet = fx.delayWet; this.reverbWet = fx.reverbWet;
    this.gainDb = 0;
    this.activeSources = [];

    this.headerEl = headerEl; this.laneEl = laneEl;
    this.buildHeader();
    this.canvas = document.createElement('canvas');
    this.canvas.className = 'lane';
    laneEl.appendChild(this.canvas);
    this.fileInput = document.createElement('input');
    this.fileInput.type = 'file'; this.fileInput.accept = 'audio/*';
    this.fileInput.style.display = 'none';
    laneEl.appendChild(this.fileInput);
    this.fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) this.loadFile(e.target.files[0]);
    });
    this.wireLaneEvents();
    this.resize();
  }

  buildHeader(){
    const h = this.headerEl;
    h.innerHTML = `
      <div class="stripe" style="background:${this.color}"></div>
      <div class="trackTop"><span class="trackNum">${this.index+1}</span><span class="recBadge">REC</span><button class="addAudioBtn" data-add>+ AUDIO</button></div>
      <div class="trackBtns">
        <button class="mbtn" data-m>M</button>
        <button class="mbtn" data-s>S</button>
        <button class="mbtn recordArm${this.index===armedTrackIndex?' active':''}" data-r title="Arm Track ${this.index+1} for recording">R</button>
        <button class="mbtn" data-fx>FX</button>
      </div>
      <div class="faderRow">
        <canvas class="faderCanvasWrap" width="150" height="20"></canvas>
      </div>
      <div class="dbLabel">0.0 dB</div>
    `;
    h.querySelector('[data-m]').addEventListener('click', (e) => {
      this.mute = !this.mute; e.target.classList.toggle('active', this.mute); this.applyMuteSolo();
    });
    h.querySelector('[data-s]').addEventListener('click', (e) => {
      this.solo = !this.solo; e.target.classList.toggle('active', this.solo); this.applyMuteSolo();
    });
    h.querySelector('[data-r]').addEventListener('click', () => armTrack(this.index));
    h.querySelector('[data-fx]').addEventListener('click', (e) => this.toggleFxPopover(e.target));
    h.querySelector('[data-add]').addEventListener('click', () => this.fileInput.click());
    wireFader(h.querySelector('.faderCanvasWrap'), h.querySelector('.dbLabel'), () => this.gainDb, (db) => {
      this.gainDb = db; this.gainNode.gain.value = Math.pow(10, db/20);
    }, this.color);
  }

  toggleFxPopover(anchorEl){
    const existing = document.getElementById('fxPopover');
    if (existing){ existing.remove(); if (existing.dataset.track===String(this.index)) return; }
    const pop = document.createElement('div');
    pop.id = 'fxPopover'; pop.className = 'fxPopover'; pop.dataset.track = this.index;
    pop.innerHTML = `
      <div class="fxPopTitle">Track ${this.index+1} EQ</div>
      <div class="eqRow">
        <div class="eqCol"><canvas data-eq="low" width="30" height="30"></canvas><span>Low</span></div>
        <div class="eqCol"><canvas data-eq="mid" width="30" height="30"></canvas><span>Mid</span></div>
        <div class="eqCol"><canvas data-eq="high" width="30" height="30"></canvas><span>High</span></div>
      </div>
      <div class="fxPopTitle" style="margin-top:10px;">FX</div>
      <div class="eqRow">
        <div class="eqCol"><canvas data-fx="delay" width="30" height="30"></canvas><span>Delay</span></div>
        <div class="eqCol"><canvas data-fx="reverb" width="30" height="30"></canvas><span>Reverb</span></div>
      </div>
    `;
    const rect = anchorEl.getBoundingClientRect();
    pop.style.left = rect.left+'px'; pop.style.top = (rect.bottom+6)+'px';
    document.body.appendChild(pop);
    wireKnob(pop.querySelector('[data-eq="low"]'), this.color, v => this.lowFilter.gain.value=(v-0.5)*24, this.lowFilter.gain.value/24+0.5, 0.5);
    wireKnob(pop.querySelector('[data-eq="mid"]'), this.color, v => this.midFilter.gain.value=(v-0.5)*24, this.midFilter.gain.value/24+0.5, 0.5);
    wireKnob(pop.querySelector('[data-eq="high"]'), this.color, v => this.highFilter.gain.value=(v-0.5)*24, this.highFilter.gain.value/24+0.5, 0.5);
    wireKnob(pop.querySelector('[data-fx="delay"]'), this.color, v => this.delayWet.gain.value=v, this.delayWet.gain.value, 0);
    wireKnob(pop.querySelector('[data-fx="reverb"]'), this.color, v => this.reverbWet.gain.value=v, this.reverbWet.gain.value, 0);
    setTimeout(() => {
      window.addEventListener('click', function closeOnce(e){
        if (!pop.contains(e.target) && e.target!==anchorEl){ pop.remove(); window.removeEventListener('click', closeOnce); }
      });
    }, 0);
  }

  applyMuteSolo(){
    const anySolo = tracks.some(t => t.solo);
    const audible = this.mute ? false : (anySolo ? this.solo : true);
    this.gainNode.gain.value = audible ? Math.pow(10, this.gainDb/20) : 0;
  }

  resize(){
    const rect = this.laneEl.getBoundingClientRect();
    this.canvas.width = rect.width; this.canvas.height = rect.height;
    this.draw();
  }

  async decodeFile(file){
    const arr = await file.arrayBuffer();
    const buffer = await audioCtx.decodeAudioData(arr.slice(0));
    return { buffer, peaks:computePeaks(buffer, 1200) };
  }

  async loadFile(file){
    const decoded = await this.decodeFile(file);
    const clip = {
      buffer:decoded.buffer, peaks:decoded.peaks, startSeconds:0, trimStart:0,
      duration:decoded.buffer.duration, sourceDuration:decoded.buffer.duration,
      fadeIn:0, fadeOut:0, gainDb:0, name:file.name,
      sourceFileName:file.name, sourceFile:file
    };
    this.clips = [clip];
    sessionState.sourceFiles.set(file.name.toLowerCase(), file);
    timelineLength = Math.max(timelineLength, clip.duration + 5);
    rebuildRuler();
    this.draw();
  }

  addRecordedBuffer(buffer, file, startSeconds){
    const clip = {
      buffer, peaks:computePeaks(buffer, 1200), startSeconds:Math.max(0,startSeconds), trimStart:0,
      duration:buffer.duration, sourceDuration:buffer.duration,
      fadeIn:0.005, fadeOut:0.005, gainDb:0, name:file.name,
      sourceFileName:file.name, sourceFile:file
    };
    this.clips.push(clip);
    this.clips.sort((a,b) => a.startSeconds-b.startSeconds);
    this.selected = this.clips.indexOf(clip);
    currentTrackForSplit = this;
    sessionState.sourceFiles.set(file.name.toLowerCase(), file);
    timelineLength = Math.max(timelineLength, clip.startSeconds+clip.duration+5);
    rebuildRuler();
    this.draw();
  }

  async addSessionClip(spec, file){
    let decoded = null;
    if (file){
      try { decoded = await this.decodeFile(file); sessionState.sourceFiles.set(file.name.toLowerCase(), file); }
      catch(err){ console.warn('Could not decode session audio', file.name, err); }
    }
    const sourceDuration = Number(spec.sourceDuration || spec.duration || (decoded ? decoded.buffer.duration : 0));
    this.clips.push({
      buffer: decoded ? decoded.buffer : null,
      peaks: decoded ? decoded.peaks : new Array(1200).fill(0),
      startSeconds:Number(spec.start||0), trimStart:Number(spec.trimStart||0),
      duration:Number(spec.duration||sourceDuration||0), sourceDuration:sourceDuration,
      fadeIn:Number(spec.fadeIn||0), fadeOut:Number(spec.fadeOut||0), gainDb:Number(spec.gainDb||0),
      name:spec.name||spec.sourceFileName||'Clip',
      sourceFileName:spec.sourceFileName||spec.name||'', sourceFile:file||null
    });
  }

  x2sec(x){ return x / pxPerSecond + viewStartSeconds; }
  sec2x(s){ return (s - viewStartSeconds) * pxPerSecond; }

  hitTest(x, y){
    for (let i=0;i<this.clips.length;i++){
      const c = this.clips[i];
      const cx0 = this.sec2x(c.startSeconds), cx1 = this.sec2x(c.startSeconds+c.duration);
      if (x>=cx0 && x<=cx1) return i;
    }
    return -1;
  }

  draw(){
    const ctx = this.canvas.getContext('2d');
    const w = this.canvas.width, h = this.canvas.height;
    ctx.clearRect(0,0,w,h);

    // Give every track a persistent, AirForge-style lane identity instead of
    // allowing empty rows to collapse visually into one black canvas.
    const lanePad = 6;
    ctx.fillStyle = hexAlpha(this.color, 0.045);
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(2,9,16,0.34)';
    roundRect(ctx, lanePad, lanePad, Math.max(0, w-lanePad*2), Math.max(0, h-lanePad*2), 7);
    ctx.fill();
    ctx.strokeStyle = hexAlpha(this.color, 0.20);
    ctx.lineWidth = 1;
    roundRect(ctx, lanePad+0.5, lanePad+0.5, Math.max(0, w-lanePad*2-1), Math.max(0, h-lanePad*2-1), 7);
    ctx.stroke();

    // Subtle centre line and edge separators make the lane read as a real
    // waveform workspace even before audio is loaded.
    ctx.strokeStyle = hexAlpha(this.color, 0.10);
    ctx.beginPath(); ctx.moveTo(lanePad, h/2+0.5); ctx.lineTo(w-lanePad, h/2+0.5); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.035)';
    ctx.beginPath(); ctx.moveTo(0,0.5); ctx.lineTo(w,0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,h-0.5); ctx.lineTo(w,h-0.5); ctx.stroke();

    // grid -- same adaptive spacing as the ruler, only across the visible range
    ctx.strokeStyle='rgba(255,255,255,0.045)';
    const gridStep = rulerTickStep();
    const firstGrid = Math.floor(viewStartSeconds/gridStep)*gridStep;
    const visibleEnd = viewStartSeconds + w/pxPerSecond;
    for (let s=firstGrid; s<=visibleEnd; s+=gridStep){
      const x=this.sec2x(s); ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
    }
    if (this.clips.length===0){
      const dropW = Math.min(460, Math.max(220, w-72));
      const dropH = Math.min(56, h-28);
      const dropX = (w-dropW)/2;
      const dropY = (h-dropH)/2;
      ctx.fillStyle = hexAlpha(this.color, 0.045);
      roundRect(ctx, dropX, dropY, dropW, dropH, 8); ctx.fill();
      ctx.strokeStyle = hexAlpha(this.color, 0.42);
      ctx.lineWidth = 1.2;
      roundRect(ctx, dropX+0.5, dropY+0.5, dropW-1, dropH-1, 8); ctx.stroke();
      ctx.fillStyle = 'rgba(238,246,251,0.68)';
      ctx.font = '600 12px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Drop audio here  •  or use + AUDIO', w/2, h/2+4);
      ctx.textAlign = 'left';
    }
    this.clips.forEach((c,i) => this.drawClip(ctx,c,i===this.selected));
    // Intro/EOM markers. The small top grips make their drag affordance clear
    // without adding large flags that compete with the waveform.
    const ix = this.sec2x(markerState.intro), ex = this.sec2x(markerState.eom);
    ctx.strokeStyle='rgba(18,255,162,0.82)'; ctx.lineWidth=1.7;
    ctx.beginPath(); ctx.moveTo(ix,0); ctx.lineTo(ix,h); ctx.stroke();
    ctx.fillStyle='rgba(18,255,162,0.96)';
    ctx.beginPath(); ctx.arc(ix,7,4.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(72,168,255,0.82)'; ctx.lineWidth=1.7;
    ctx.beginPath(); ctx.moveTo(ex,0); ctx.lineTo(ex,h); ctx.stroke();
    ctx.fillStyle='rgba(72,168,255,0.96)';
    ctx.beginPath(); ctx.arc(ex,7,4.2,0,Math.PI*2); ctx.fill();
    // playhead
    const px = this.sec2x(transportNow());
    ctx.strokeStyle='rgba(255,196,77,0.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke();
  }

  drawClip(ctx, c, selected){
    const x0 = this.sec2x(c.startSeconds), x1 = this.sec2x(c.startSeconds+c.duration);
    const h = this.canvas.height, pad=6;
    ctx.fillStyle = hexAlpha(this.color, selected?0.22:0.14);
    roundRect(ctx, x0, pad, x1-x0, h-pad*2, 6); ctx.fill();
    ctx.strokeStyle = selected ? '#ffffff' : hexAlpha(this.color,0.6);
    ctx.lineWidth = selected?1.6:1;
    roundRect(ctx, x0, pad, x1-x0, h-pad*2, 6); ctx.stroke();

    // waveform
    const peaks = c.peaks;
    const visW = x1-x0, midY = h/2;
    ctx.fillStyle = hexAlpha(this.color, 0.85);
    const trimFrac0 = c.trimStart / c.sourceDuration;
    const trimFrac1 = (c.trimStart+c.duration) / c.sourceDuration;
    const i0 = Math.floor(trimFrac0*peaks.length), i1 = Math.ceil(trimFrac1*peaks.length);
    for (let px=0; px<visW; px++){
      const idx = i0 + Math.floor((px/visW)*(i1-i0));
      const pk = peaks[Math.max(0,Math.min(peaks.length-1,idx))] || 0;
      const barH = pk*(h-pad*2-4);
      ctx.fillRect(x0+px, midY-barH/2, 1, barH);
    }

    // fade triangles -- fadeIn/fadeOut are DURATIONS, so this needs a pure
    // scale conversion (duration * pxPerSecond), not sec2x(), which is for
    // absolute positions and subtracts viewStartSeconds. Once the view had
    // panned away from time zero, sec2x(c.fadeIn) produced a wildly wrong
    // (often deeply negative) width, which is exactly what made separated
    // clips look like they shared one continuous fade across the gap.
    ctx.fillStyle='rgba(2,9,16,0.55)';
    if (c.fadeIn>0){
      const fx = c.fadeIn * pxPerSecond;
      ctx.beginPath(); ctx.moveTo(x0,pad); ctx.lineTo(x0+fx,pad); ctx.lineTo(x0,h-pad); ctx.closePath(); ctx.fill();
    }
    if (c.fadeOut>0){
      const fx = c.fadeOut * pxPerSecond;
      ctx.beginPath(); ctx.moveTo(x1,pad); ctx.lineTo(x1-fx,pad); ctx.lineTo(x1,h-pad); ctx.closePath(); ctx.fill();
    }
  }

  wireLaneEvents(){
    let dragMode=null, dragClip=-1, dragStartX=0, orig=null, mouseDownX=0, dragMoved=false;
    let markerDragKind=null;
    const edgeZone = 12;
    const markerHitZone = 11;

    this.canvas.addEventListener('mousedown', (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX-rect.left, y = e.clientY-rect.top;

      // Marker hit testing has priority over clip move/trim. This prevents a
      // marker line sitting over a clip from making the marker impossible to grab.
      const introX=this.sec2x(markerState.intro), eomX=this.sec2x(markerState.eom);
      const introDist=Math.abs(x-introX), eomDist=Math.abs(x-eomX);
      if (Math.min(introDist,eomDist) <= markerHitZone){
        markerDragKind = introDist <= eomDist ? 'intro' : 'eom';
        dragMode='marker'; dragClip=-1; dragMoved=true;
        this.canvas.style.cursor='ew-resize';
        e.preventDefault();
        return;
      }

      const idx = this.hitTest(x,y);
      this.selected = idx;
      currentTrackForSplit = this;
      if (idx===-1){
        seekTo(this.x2sec(x));
        this.selected=-1;
        this.draw();
        return;
      }
      const c = this.clips[idx];
      const cx0=this.sec2x(c.startSeconds), cx1=this.sec2x(c.startSeconds+c.duration);
      const topCorner = y < 16;
      dragStartX = x; orig = {...c}; dragClip = idx; mouseDownX = x; dragMoved = false;

      // Fade corners checked BEFORE trim edges (this is the exact hit-test
      // priority bug we found and fixed in the real app -- trim's edge zone
      // has no vertical constraint, so it must not be checked first or the
      // fade handle becomes unreachable).
      if (topCorner && Math.abs(x-cx0)<=12) dragMode='fadeIn';
      else if (topCorner && Math.abs(x-cx1)<=12) dragMode='fadeOut';
      else if (Math.abs(x-cx0)<=edgeZone) dragMode='trimStart';
      else if (Math.abs(x-cx1)<=edgeZone) dragMode='trimEnd';
      else dragMode='move';
      this.draw();
    });

    this.canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX-rect.left, y = e.clientY-rect.top;
      const clickedTime = Math.max(0, this.x2sec(x));
      const idx = this.hitTest(x,y);
      const items = [
        { label:'Set Intro Here', enabled:true, action:() => setMarkerAt('intro', clickedTime) },
        { label:'Set EOM Here', enabled:true, action:() => setMarkerAt('eom', clickedTime) },
      ];

      if (idx!==-1){
        this.selected = idx;
        currentTrackForSplit = this;
        this.draw();
        const c = this.clips[idx];
        const t = transportNow();
        const canSplit = t>c.startSeconds+0.05 && t<c.startSeconds+c.duration-0.05;
        items.push(
          { sep:true },
          { label:'Split at Playhead', enabled:canSplit, action:() => this.splitAtPlayhead() },
          { label:'Duplicate Clip', enabled:true, action:() => this.duplicateSelected() },
          { sep:true },
          { label:'Delete Clip', enabled:true, action:() => this.removeSelected() }
        );
      }
      showContextMenu(e.clientX, e.clientY, items);
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragMode) return;
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX-rect.left;
      if (dragMode==='marker' && markerDragKind){
        let value = Math.max(0, this.x2sec(x));
        if (snapEnabled && !e.altKey) value = Math.round(value*100)/100; // 10 ms marker snap
        setMarkerAt(markerDragKind, value);
        this.canvas.style.cursor='ew-resize';
        return;
      }
      if (dragClip<0) return;
      if (Math.abs(x-mouseDownX) > 3) dragMoved = true;
      // Pure delta -- NOT this.x2sec(), which adds viewStartSeconds and is
      // only correct for absolute positions. Using it here was adding a
      // phantom offset equal to however far the view had panned/zoomed,
      // which is exactly what caused clips to jump several seconds on a
      // tiny drag once the view was no longer at the very start.
      let deltaSec = (x-dragStartX) / pxPerSecond;
      const snap = (v) => (snapEnabled && !e.altKey) ? Math.round(v*4)/4 : v;
      const c = this.clips[dragClip];

      if (dragMode==='move'){
        c.startSeconds = Math.max(0, snap(orig.startSeconds+deltaSec));
      } else if (dragMode==='trimStart'){
        const maxStart = orig.startSeconds+orig.duration-0.1;
        const newStart = Math.min(maxStart, Math.max(0, snap(orig.startSeconds+deltaSec)));
        const shift = newStart-orig.startSeconds;
        c.startSeconds = newStart;
        c.trimStart = Math.max(0, orig.trimStart+shift);
        c.duration = orig.duration-shift;
      } else if (dragMode==='trimEnd'){
        const minEnd = orig.startSeconds+0.1;
        const newDur = Math.max(0.1, snap(orig.duration+deltaSec));
        c.duration = Math.min(newDur, orig.sourceDuration-c.trimStart);
      } else if (dragMode==='fadeIn'){
        c.fadeIn = Math.max(0, Math.min(c.duration*0.9, orig.fadeIn+deltaSec));
      } else if (dragMode==='fadeOut'){
        c.fadeOut = Math.max(0, Math.min(c.duration*0.9, orig.fadeOut-deltaSec));
      }
      this.draw();
    });
    window.addEventListener('mouseup', () => {
      // A plain click on a clip body (selected it, but never actually
      // dragged) also moves the playhead there -- previously the ONLY way
      // to position the cursor was clicking blank space, which made it
      // impossible to ever get the cursor INSIDE a loaded clip, which in
      // turn made Split unreachable (it requires the cursor to be inside
      // the clip). A real drag still moves/trims/fades as before; this
      // only fires when nothing actually moved.
      if (dragMode==='move' && !dragMoved && dragClip>=0){
        seekTo(this.x2sec(mouseDownX));
      }
      dragMode=null; dragClip=-1; markerDragKind=null;
    });

    // Touch marker dragging for tablets/phones. Keep it marker-only so touch
    // clip editing behavior is not changed unexpectedly.
    this.canvas.addEventListener('touchstart', (e) => {
      if (!e.touches.length) return;
      const rect=this.canvas.getBoundingClientRect();
      const x=e.touches[0].clientX-rect.left;
      const introDist=Math.abs(x-this.sec2x(markerState.intro));
      const eomDist=Math.abs(x-this.sec2x(markerState.eom));
      if (Math.min(introDist,eomDist)<=18){
        markerDragKind=introDist<=eomDist?'intro':'eom';
        e.preventDefault();
      }
    }, {passive:false});
    this.canvas.addEventListener('touchmove', (e) => {
      if (!markerDragKind || !e.touches.length) return;
      const rect=this.canvas.getBoundingClientRect();
      const x=e.touches[0].clientX-rect.left;
      setMarkerAt(markerDragKind, Math.max(0, this.x2sec(x)));
      e.preventDefault();
    }, {passive:false});
    this.canvas.addEventListener('touchend', () => { markerDragKind=null; });
    this.canvas.addEventListener('touchcancel', () => { markerDragKind=null; });

    // Hover feedback: cursor changes near trim edges/fade corners so the
    // grab zones are actually visible, not just theoretically clickable.
    this.canvas.addEventListener('mousemove', (e) => {
      if (dragMode) return; // don't fight the active drag's own feedback
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX-rect.left, y = e.clientY-rect.top;
      const idx = this.hitTest(x,y);
      if (idx===-1){ this.canvas.style.cursor = 'crosshair'; return; }
      const c = this.clips[idx];
      const cx0=this.sec2x(c.startSeconds), cx1=this.sec2x(c.startSeconds+c.duration);
      const topCorner = y<16;
      if (topCorner && (Math.abs(x-cx0)<=12 || Math.abs(x-cx1)<=12)) this.canvas.style.cursor='ns-resize';
      else if (Math.abs(x-cx0)<=edgeZone || Math.abs(x-cx1)<=edgeZone) this.canvas.style.cursor='ew-resize';
      else this.canvas.style.cursor='grab';
    });

    this.canvas.addEventListener('dragover', e => e.preventDefault());
    this.canvas.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files.length) this.loadFile(e.dataTransfer.files[0]);
    });
  }

  splitAtPlayhead(){
    if (this.selected<0) return;
    const c = this.clips[this.selected];
    const t = transportNow();
    if (t<=c.startSeconds+0.05 || t>=c.startSeconds+c.duration-0.05) return;
    const rightDur = c.startSeconds+c.duration-t;
    const leftDur = t-c.startSeconds;
    // 15ms is long enough to smooth over a hard discontinuity at the cut
    // point (avoids a click/pop if the waveform isn't at a zero-crossing
    // right there) but short enough that it doesn't read as an actual
    // fade -- clamped to 40% of whichever side is shorter so a very tiny
    // split fragment never gets over-faded.
    const DEFAULT_SPLIT_FADE = 0.015;
    const right = {...c, startSeconds:t, trimStart:c.trimStart+(t-c.startSeconds), duration:rightDur,
                   fadeIn: Math.min(rightDur*0.4, DEFAULT_SPLIT_FADE)};
    c.duration = leftDur;
    c.fadeOut = Math.min(leftDur*0.4, DEFAULT_SPLIT_FADE);
    this.clips.splice(this.selected+1, 0, right);
    this.draw();
  }

  removeSelected(){
    if (this.selected<0) return;
    this.clips.splice(this.selected, 1);
    this.selected = -1;
    this.draw();
  }

  duplicateSelected(){
    if (this.selected<0) return;
    const c = this.clips[this.selected];
    const copy = {...c, startSeconds: c.startSeconds+c.duration+0.25};
    this.clips.splice(this.selected+1, 0, copy);
    this.selected += 1;
    this.draw();
  }

  scheduleFrom(startTransportTime){
    this.clips.forEach(c => {
      if (!c.buffer) return;
      const clipEnd = c.startSeconds+c.duration;
      if (clipEnd <= startTransportTime) return;
      const src = audioCtx.createBufferSource();
      src.buffer = c.buffer;
      const fadeGain = audioCtx.createGain();
      src.connect(fadeGain); fadeGain.connect(this.gainNode);

      const offsetIntoClip = Math.max(0, startTransportTime-c.startSeconds);
      const bufferOffset = c.trimStart+offsetIntoClip;
      const playDuration = c.duration-offsetIntoClip;
      const whenCtx = audioCtx.currentTime + Math.max(0, c.startSeconds-startTransportTime);

      // Fade automation
      fadeGain.gain.setValueAtTime(0.0001, whenCtx);
      const fadeInEnd = whenCtx + Math.max(0, c.fadeIn-offsetIntoClip);
      fadeGain.gain.linearRampToValueAtTime(1, c.fadeIn>offsetIntoClip ? fadeInEnd : whenCtx+0.005);
      const fadeOutStart = whenCtx + Math.max(0, (c.duration-c.fadeOut)-offsetIntoClip);
      if (c.fadeOut>0){
        fadeGain.gain.setValueAtTime(1, fadeOutStart);
        fadeGain.gain.linearRampToValueAtTime(0.0001, whenCtx+playDuration);
      }
      src.start(whenCtx, bufferOffset, playDuration);
      this.activeSources.push(src);
    });
  }
  stopAll(){ this.activeSources.forEach(s => { try{s.stop();}catch(e){} }); this.activeSources=[]; }
}

function hexAlpha(hex, a){
  const n = parseInt(hex.slice(1),16);
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return `rgba(${r},${g},${b},${a})`;
}
function computePeaks(buffer, resolution){
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length/resolution);
  const peaks = [];
  for (let i=0;i<resolution;i++){
    let max=0;
    for (let j=i*step;j<Math.min(data.length,(i+1)*step);j++) max=Math.max(max, Math.abs(data[j]));
    peaks.push(max);
  }
  return peaks;
}

// --- Ruler ---
function rulerTickStep(){
  const targetPxPerTick = 70;
  const rawStep = targetPxPerTick / pxPerSecond;
  const niceSteps = [0.1,0.25,0.5,1,2,5,10,15,30,60,120,300];
  return niceSteps.find(s => s>=rawStep) || niceSteps[niceSteps.length-1];
}

function rebuildRuler(){
  const canvas = document.getElementById('rulerCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(34,216,255,0.4)'; ctx.fillStyle='#7d93a3'; ctx.font='10px sans-serif';
  // Tick spacing adapts to zoom -- fixed 5s ticks either flood together when
  // zoomed in or thin out to nothing useful when zoomed out.
  const step = rulerTickStep();
  const firstTick = Math.floor(viewStartSeconds/step)*step;
  const visibleEnd = viewStartSeconds + canvas.width/pxPerSecond;
  for (let s=firstTick; s<=visibleEnd; s+=step){
    const x = (s-viewStartSeconds)*pxPerSecond;
    ctx.beginPath(); ctx.moveTo(x,canvas.height-8); ctx.lineTo(x,canvas.height); ctx.stroke();
    ctx.fillText((step<1 ? s.toFixed(1) : Math.round(s))+'s', x+3, 12);
  }

  // Compact ruler flags provide a single obvious drag target while the full
  // marker lines remain draggable in every track lane.
  const drawMarkerFlag=(seconds,label,color) => {
    const x=(seconds-viewStartSeconds)*pxPerSecond;
    if (x < -42 || x > canvas.width+42) return;
    ctx.font='700 9px Segoe UI, sans-serif';
    const flagW=label==='INTRO'?42:32, flagH=15;
    const left=Math.max(0,Math.min(canvas.width-flagW,x-flagW/2));
    ctx.fillStyle=color; ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=.7;
    roundRect(ctx,left,1,flagW,flagH,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#031018'; ctx.textAlign='center';
    ctx.fillText(label,left+flagW/2,11.5);
    ctx.beginPath(); ctx.moveTo(x,flagH+1); ctx.lineTo(x-4,flagH-3); ctx.lineTo(x+4,flagH-3); ctx.closePath();
    ctx.fillStyle=color; ctx.fill();
    ctx.textAlign='left';
  };
  drawMarkerFlag(markerState.intro,'INTRO','#12ffa2');
  drawMarkerFlag(markerState.eom,'EOM','#48a8ff');
}
rebuildRuler();

  const rect=rulerEl.getBoundingClientRect();

}
function rulerMarkerHit(x){
  const ix=(markerState.intro-viewStartSeconds)*pxPerSecond;
  const ex=(markerState.eom-viewStartSeconds)*pxPerSecond;
  const di=Math.abs(x-ix), de=Math.abs(x-ex);
  return Math.min(di,de)<=18 ? (di<=de?'intro':'eom') : null;
}

function preferredRecordingMime(){
  if (!window.MediaRecorder) return '';
  const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return types.find(t => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || '';
}

function recordingFileName(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `AF_Lite_Record_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}.wav`;
}

async function startRecording(){
  if (isRecording) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
    alert('Microphone recording is not supported in this browser. Use a current Chrome, Edge, or Firefox build over HTTPS or localhost.');
    return;
  }
  try{
    if (audioCtx.state==='suspended') await audioCtx.resume();
    if (isPlaying){
      playhead = transportNow();
      stopAllTracks();
      isPlaying = false;
    }
    recordStream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }, video:false });
    const mimeType = preferredRecordingMime();
    mediaRecorder = mimeType ? new MediaRecorder(recordStream,{mimeType}) : new MediaRecorder(recordStream);
    recordChunks = [];
    recordStartPosition = playhead;
    mediaRecorder.addEventListener('dataavailable', e => { if (e.data && e.data.size) recordChunks.push(e.data); });
    mediaRecorder.addEventListener('stop', finalizeRecording, {once:true});
    mediaRecorder.addEventListener('error', e => { console.error(e); alert('Recording failed: '+(e.error?.message||'unknown recorder error')); });

    isRecording = true;
    isPlaying = true; // transport and existing tracks run while the microphone records
    startPlayback();
    mediaRecorder.start(200);
    document.getElementById('btnPlay').innerHTML='&#10074;&#10074;';
    updateRecordUi();
  }catch(err){
    console.error('Microphone access failed',err);
    if (recordStream) recordStream.getTracks().forEach(t=>t.stop());
    recordStream=null;
    alert('AirForge Lite could not access the microphone. Allow microphone permission and use HTTPS or localhost.\n\n'+err.message);
  }
}

function stopRecording(){
  if (!isRecording) return;
  const endPosition = transportNow();
  isRecording = false;
  isPlaying = false;
  playhead = endPosition;
  stopAllTracks();
  document.getElementById('btnPlay').innerHTML='&#9654;';
  updateRecordUi();
  updateTimeReadout();
  tracks.forEach(t=>t.draw());
  if (mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
}

async function finalizeRecording(){
  try{
    const mime = mediaRecorder?.mimeType || recordChunks[0]?.type || 'audio/webm';
    const captured = new Blob(recordChunks,{type:mime});
    if (!captured.size) throw new Error('No microphone audio was captured.');
    const arr = await captured.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arr.slice(0));
    const wavBlob = encodeWav(decoded);
    const file = new File([wavBlob], recordingFileName(), {type:'audio/wav', lastModified:Date.now()});
    tracks[armedTrackIndex].addRecordedBuffer(decoded,file,recordStartPosition);
  }catch(err){
    console.error('Could not finalize recording',err);
    alert('The recording stopped, but the browser could not convert it into a session clip.\n\n'+err.message);
  }finally{
    if (recordStream) recordStream.getTracks().forEach(t=>t.stop());
    recordStream=null; mediaRecorder=null; recordChunks=[];
  }
}

// --- Zoom / pan ---
// Zooming toward a fixed anchor point (cursor or playhead) rather than
// always toward x=0 -- otherwise every zoom click shoves whatever you were
// looking at off to the side, which is disorienting fast.
function zoomBy(factor, anchorSeconds){
  const oldPx = pxPerSecond;
  const newPx = Math.max(4, Math.min(400, pxPerSecond*factor));
  const pixelPos = (anchorSeconds-viewStartSeconds) * oldPx;
  pxPerSecond = newPx;
  viewStartSeconds = anchorSeconds - pixelPos/newPx;
  clampView();
  rebuildRuler(); tracks.forEach(t=>t.draw());
}
// For the zoom buttons specifically: actually center the anchor in the
// viewport rather than just preserving its current pixel position. Pixel-
// preserving (zoomBy above) is correct for wheel-zoom, where the anchor IS
// the mouse position and keeping it fixed feels natural -- but for a
// button click, "preserve position" can be so subtle it doesn't read as
// centering on the cursor at all. This makes it unambiguous.
function zoomByAndCenter(factor, anchorSeconds){
  pxPerSecond = Math.max(4, Math.min(400, pxPerSecond*factor));
  viewStartSeconds = anchorSeconds - visibleSeconds()/2;
  clampView();
  rebuildRuler(); tracks.forEach(t=>t.draw());
}
function clampView(){
  viewStartSeconds = Math.max(0, Math.min(viewStartSeconds, Math.max(0, timelineLength - visibleSeconds())));
}
function visibleSeconds(){
  const rect = document.querySelector('.ruler').getBoundingClientRect();
  return rect.width / pxPerSecond;
}

function contentEndSeconds(){
  let end = 0;
  tracks.forEach(t => t.clips.forEach(c => { end = Math.max(end, c.startSeconds+c.duration); }));
  return Math.max(1, end + 0.5);

function asciiFixed(text, length, padByte=0x20){
  const out = new Uint8Array(length); out.fill(padByte);
  const clean = String(text ?? '').replace(/[\u0000-\u001f]/g, ' ');
  for (let i=0;i<Math.min(length, clean.length);i++) out[i] = clean.charCodeAt(i) & 0xff;
  return out;
}
function concatBytes(parts){
  const total = parts.reduce((n,p)=>n+p.length,0);
  const out = new Uint8Array(total); let off=0;
  parts.forEach(p=>{ out.set(p,off); off+=p.length; });
  return out;
}
function fourCC(text){ return Uint8Array.from([...text].map(c=>c.charCodeAt(0))); }
function u16le(v){ return Uint8Array.of(v&255,(v>>>8)&255); }
function u32le(v){ return Uint8Array.of(v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255); }
function u32be(v){ return Uint8Array.of((v>>>24)&255,(v>>>16)&255,(v>>>8)&255,v&255); }
function synchsafe(v){ return Uint8Array.of((v>>>21)&0x7f,(v>>>14)&0x7f,(v>>>7)&0x7f,v&0x7f); }
function riffChunk(id, payload){
  const pad = payload.length & 1 ? Uint8Array.of(0) : new Uint8Array(0);
  return concatBytes([fourCC(id), u32le(payload.length), payload, pad]);
}
function digitsOnly(value, limit=0){
  let out = String(value ?? '').replace(/\D/g,'');
  return limit>0 ? out.slice(0,limit) : out;
}
function dateForBext(value){
  const d = digitsOnly(value);
  if (d.length===8){
    // Accept YYYYMMDD or MMDDYYYY.
    return d.slice(0,4).startsWith('20') ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`

    const audible=!track.mute && (!anySolo || track.solo);

    const lo=offlineCtx.createBiquadFilter(); lo.type='lowshelf'; lo.frequency.value=200; lo.gain.value=track.lowFilter.gain.value;
    const mid=offlineCtx.createBiquadFilter(); mid.type='peaking'; mid.frequency.value=1200; mid.Q.value=.9; mid.gain.value=track.midFilter.gain.value;
    const hi=offlineCtx.createBiquadFilter(); hi.type='highshelf'; hi.frequency.value=5000; hi.gain.value=track.highFilter.gain.value;

let lameLoadPromise=null;
function loadScriptOnce(src,id){
  return new Promise((resolve,reject)=>{
    const existing=document.getElementById(id);
    if(existing){
      if(window.lamejs) return resolve(window.lamejs);
      existing.addEventListener('load',()=>window.lamejs?resolve(window.lamejs):reject(new Error('Encoder loaded but did not initialize.')),{once:true});
      existing.addEventListener('error',()=>reject(new Error('Encoder source failed: '+src)),{once:true});
      return;
    }
    const sc=document.createElement('script');
    sc.id=id; sc.async=true; sc.src=src;
    sc.onload=()=>window.lamejs?resolve(window.lamejs):reject(new Error('Encoder loaded but did not initialize.'));
    sc.onerror=()=>{ sc.remove(); reject(new Error('Encoder source failed: '+src)); };
    document.head.appendChild(sc);
  });

function loadLame(){
  if(window.lamejs) return Promise.resolve(window.lamejs);
  if(lameLoadPromise) return lameLoadPromise;
  const sources=[
    './vendor/lamejs.iife.js',
    'https://cdn.jsdelivr.net/npm/@breezystack/lamejs@1.2.7/dist/lamejs.iife.js',
    'https://unpkg.com/@breezystack/lamejs@1.2.7/dist/lamejs.iife.js'
  ];
  lameLoadPromise=(async()=>{
    let lastError=null;
    for(let i=0;i<sources.length;i++){
      try{
        const lib=await loadScriptOnce(sources[i],'airforgeLameJs'+i);
        if(lib) return lib;
      }catch(err){ lastError=err; }
    }
    lameLoadPromise=null;
    throw new Error('MP3 encoder could not be loaded from the local copy or either backup source. WAV export is still available.'+(lastError?' '+lastError.message:''));
  })();
  return lameLoadPromise;
}
async function encodeMp3(audioBuffer){
  const lame=await loadLame();
  const channels=2, rate=44100, kbps=192;
  const enc=new lame.Mp3Encoder(channels,rate,kbps);
  const left=audioBuffer.getChannelData(0), right=audioBuffer.numberOfChannels>1?audioBuffer.getChannelData(1):left;
  const block=1152, chunks=[];
  const l16=new Int16Array(block), r16=new Int16Array(block);
  for(let i=0;i<left.length;i+=block){
    const n=Math.min(block,left.length-i);
    for(let j=0;j<n;j++){
      l16[j]=Math.max(-32768,Math.min(32767,Math.round(left[i+j]*32767)));
      r16[j]=Math.max(-32768,Math.min(32767,Math.round(right[i+j]*32767)));

    const data=enc.encodeBuffer(l16.subarray(0,n),r16.subarray(0,n));
    if(data.length) chunks.push(new Uint8Array(data));

async function exportMix(){

function xmlEscape(v){

}

function makeSessionXml(){
  const end = Math.max(60, contentEndSeconds()+4);

    const clips = track.clips.map(c => {
      const sourceName = c.sourceFileName || c.name || 'audio.wav';
      return `      <Clip name="${xmlEscape(c.name||sourceName)}" sourcePath="${xmlEscape(sourceName)}" start="${Number(c.startSeconds||0)}" duration="${Number(c.duration||0)}" trimStart="${Number(c.trimStart||0)}" sourceDuration="${Number(c.sourceDuration||c.duration||0)}" fadeIn="${Number(c.fadeIn||0)}" fadeOut="${Number(c.fadeOut||0)}" gainDb="${Number(c.gainDb||0)}" colour="${signedArgb(track.color)}"/>`;

function downloadBlob(blob, name){

}
function sanitizedSessionName(){

}

// Logo meter: the exact geometry from the standalone animated logo (apex-
// pinned top bar, 2.0-unit tuck margin behind the leg, the 13.5-unit
// centering shift, the idle-pose transition) -- except bandLevels/envelope
// here come from meterAnalyser, which taps the REAL master bus. This is an
// actual level meter wearing the logo's shape, not a decorative loop.
let logoBarSmooth = [0, 0];
let logoEnvelope = 0;
let logoIdleT = 1;

function tick(){
  if (isPlaying){ updateTimeReadout(); tracks.forEach(t=>t.draw()); }
  drawLogoMeter();
  requestAnimationFrame(tick);
}

function drawLogoMeter(){
  const canvas = document.getElementById('logoMeter');
  const ctx = canvas.getContext('2d');
  const S = canvas.width / 200;
  const t = performance.now() / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let bandLevels = [0, 0];
  let overall = 0;
  if (isPlaying){
    meterAnalyser.getByteFrequencyData(meterFreqData);
    meterAnalyser.getByteTimeDomainData(meterTimeData);
    const n = meterFreqData.length;
    const bands = [[0, Math.floor(n*0.10)], [Math.floor(n*0.10), Math.floor(n*0.35)]];
    bandLevels = bands.map(([a,b]) => {
      let sum=0; for (let i=a;i<b;i++) sum+=meterFreqData[i];
      const v = (sum/((b-a)||1))/255;
      return v*v*1.6;
    });
    let sumSq=0;
    for (let i=0;i<meterTimeData.length;i++){ const v=(meterTimeData[i]-128)/128; sumSq+=v*v; }
    overall = Math.sqrt(sumSq/meterTimeData.length);
  }

  for (let i=0;i<2;i++) logoBarSmooth[i] += (bandLevels[i]-logoBarSmooth[i])*0.5;
  const target = isPlaying ? overall*4.2 : 0;
  logoEnvelope += (target-logoEnvelope) * (target>logoEnvelope ? 0.4 : 0.05);
  logoEnvelope = Math.max(0, Math.min(1.35, logoEnvelope));
  const idleTarget = isPlaying ? 0 : 1;
  logoIdleT += (idleTarget-logoIdleT)*0.05;
  logoIdleT = Math.max(0, Math.min(1, logoIdleT));

  ctx.save();
  ctx.translate(canvas.width/2 - 100*S, canvas.height/2 - 100*S);

  // Keep the badge glow compact enough that it never reaches the canvas edge
  // and reveals a flat rectangular clipping boundary. A restrained baseline
  // halo stays alive at idle; audio adds brightness more than radius.
  const restGlow = 0.16 + 0.06*(0.5+0.5*Math.sin(t*0.6));
  const glowAmt = logoEnvelope*(1-logoIdleT) + restGlow*logoIdleT;

  ctx.fillStyle = '#0b1622';
  ctx.shadowColor = `rgba(34,216,255,${0.14+glowAmt*0.24})`;
  ctx.shadowBlur = (6+glowAmt*11)*S;
  logoRoundRect(ctx, 10*S,10*S,180*S,180*S,44*S); ctx.fill();

  // Soft, close halo: gives the border life without a broad box-shaped bloom.
  ctx.shadowColor = `rgba(34,216,255,${0.12+glowAmt*0.20})`;
  ctx.shadowBlur = (4+glowAmt*7)*S;
  ctx.strokeStyle = `rgba(34,216,255,${0.20+glowAmt*0.16})`;
  ctx.lineWidth = 3.0*S;
  logoRoundRect(ctx, 10*S,10*S,180*S,180*S,44*S); ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(34,216,255,0.42)'; ctx.lineWidth = 1.35*S;
  logoRoundRect(ctx, 10*S,10*S,180*S,180*S,44*S); ctx.stroke();

  const SHIFT_X = 13.5, MARGIN = 2.0, SAFE_RIGHT = 180, RATIO = 0.86;
  const legX = (y) => 70 + SHIFT_X + (y-55)*(100-70)/(145-55) - MARGIN;
  const idlePoseLen = [64, 34];
  const wfY_local = 126;
  const barY = [52.5, (55.0+wfY_local)/2];
  const startXs = [70+SHIFT_X-MARGIN, legX(barY[1])];
  const baseLens = [58, 44];
  const barHeight = 9;
  const topMax = SAFE_RIGHT - startXs[0];
  const maxLens = [topMax, topMax*RATIO];
  for (let i=0;i<2;i++){
    const reactiveLen = baseLens[i] + logoBarSmooth[i]*(maxLens[i]-baseLens[i]);
    const len = reactiveLen*(1-logoIdleT) + idlePoseLen[i]*logoIdleT;
    logoDrawFaderBar(ctx, startXs[i]*S, barY[i]*S, len*S, barHeight*S, logoBarSmooth[i]*(1-logoIdleT)+0.15*logoIdleT);
  }

  ctx.strokeStyle = '#f4f8fb'; ctx.lineWidth = 9*S; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo((40+SHIFT_X)*S, 145*S); ctx.lineTo((70+SHIFT_X)*S, 55*S); ctx.lineTo((100+SHIFT_X)*S, 145*S);
  ctx.stroke();

  const wfX=(55+SHIFT_X)*S, wfW=55*S, wfY=126*S, points=26;
  ctx.beginPath(); ctx.strokeStyle='rgba(34,216,255,0.98)'; ctx.lineWidth=3.2*S;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowColor='rgba(34,216,255,0.65)'; ctx.shadowBlur=10*S;
  for (let i=0;i<points;i++){
    const idx = isPlaying ? Math.floor((i/points)*meterTimeData.length) : 0;
    const v = isPlaying ? (meterTimeData[idx]-128)/128 : 0;
    const x = wfX + (i/(points-1))*wfW;
    const idleWiggle = Math.sin(t*1.4+i*0.45)*7*(0.5+0.5*Math.sin(t*0.35+i*0.2));
    const y = wfY + (v*30*logoEnvelope*(1-logoIdleT) + idleWiggle*logoIdleT)*S;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.shadowBlur=0;
  ctx.restore();
}
function logoRoundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function logoDrawFaderBar(ctx,x,y,len,h,reactAmt){
  const capR = h*0.62;
  ctx.save();
  ctx.shadowColor = `rgba(34,216,255,${0.4+Math.min(1,reactAmt)*0.6})`;
  ctx.shadowBlur = 6+Math.min(1,reactAmt)*20;
  ctx.fillStyle = '#22d8ff';
  logoRoundRect(ctx, x,y,Math.max(len,h),h,h/2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#22d8ff';
  ctx.beginPath(); ctx.arc(x+Math.max(len,h)-h/2, y+h/2, capR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#22d8ff'; ctx.lineWidth = Math.max(1,h*0.14); ctx.stroke();
  ctx.restore();
}

tick();
</script>
</body>
